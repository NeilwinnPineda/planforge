<div class="app-shell">
  <header class="app-shell__topbar">
    <a routerLink="/" class="app-shell__wordmark">Planforge</a>
    <div class="app-shell__source">
      <span class="app-shell__source-name">{{ sourceSnapshot().source.meta.title }} · {{ sourceSnapshot().origin === 'default' ? 'default' : 'imported' }}</span>
      <button type="button" class="app-shell__topbar-btn" (click)="openSourceImport()">Import</button>
      <button type="button" class="app-shell__topbar-btn" (click)="exportSourceJson()">Export</button>
      <button type="button" class="app-shell__topbar-btn" [disabled]="sourceSnapshot().origin === 'default'" (click)="resetSourceToDefault()">Default</button>
      <input #sourceFileInput type="file" accept="application/json,.json" class="app-shell__file-input" (change)="onSourceFileSelected($event)" />
    </div>
    <div class="app-shell__run">
      <span class="app-shell__run-dot" [class.app-shell__run-dot--active]="systemRunning()"></span>
      <span>{{ systemRunning() ? 'Running' : 'Paused' }}</span>
      <button type="button" class="app-shell__topbar-btn app-shell__topbar-btn--run" (click)="systemRunning() ? stopSimulation() : startSimulation()">{{ systemRunning() ? 'Pause' : 'Run' }}</button>
    </div>
  </header>

  <div class="app-shell__body">
    <nav class="app-shell__sidebar" aria-label="Planforge workflow">
      <section *ngFor="let phase of workflowPhases(); let phaseIndex = index" class="app-shell__phase" [class.app-shell__phase--active]="phaseIsActive(phase)">
        <button type="button" class="app-shell__phase-toggle" [attr.aria-expanded]="expandedPhase() === phaseIndex || phaseIsActive(phase)" (click)="togglePhase(phaseIndex)">
          <span class="app-shell__phase-number">0{{ phaseIndex + 1 }}</span>
          <span class="app-shell__phase-label"><strong>{{ phase.title }}</strong><small>{{ phase.summary }}</small></span>
        </button>
        <div *ngIf="expandedPhase() === phaseIndex || phaseIsActive(phase)" class="app-shell__phase-links">
          <a *ngFor="let item of phase.items" [routerLink]="item.path" routerLinkActive="app-shell__phase-link--active" [routerLinkActiveOptions]="{ exact: item.exact ?? false }" class="app-shell__phase-link">
            <span class="app-shell__phase-dot"></span><span>{{ item.title }}</span>
          </a>
        </div>
      </section>

      <div class="app-shell__sidebar-jump">
        <a *ngIf="previousWorkflowItem() as prev" [routerLink]="prev.path" class="app-shell__jump-link">← {{ prev.title }}</a>
        <a *ngIf="nextWorkflowItem() as next" [routerLink]="next.path" class="app-shell__jump-link app-shell__jump-link--next">{{ next.title }} →</a>
      </div>
    </nav>

    <main class="app-shell__content">
      <ng-content />
    </main>
  </div>
</div>
