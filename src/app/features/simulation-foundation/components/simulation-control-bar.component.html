<section class="simulation-bar">
  <div class="simulation-bar__controls">
    <button type="button" class="simulation-bar__btn simulation-bar__btn--primary" (click)="onPrimaryAction()">
      {{ isRunning() ? 'Pause' : 'Run' }}
    </button>
    <button type="button" class="simulation-bar__btn" (click)="onClear()">Reset</button>
  </div>

  <div class="simulation-bar__metrics">
    <div *ngFor="let metric of metrics()" class="simulation-bar__metric">
      <span>{{ metric.label }}</span>
      <strong>{{ metric.value }}</strong>
    </div>
  </div>
</section>
